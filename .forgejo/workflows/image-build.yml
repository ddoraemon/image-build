          docker tag registry.cn-hangzhou.aliyuncs.com/rotigue/${{ inputs.REPO_NAME }}:${{ inputs.TAG }}-amd64 rotigue/${{ inputs.REPO_NAME }}:${{ inputs.TAG }}-amd64
          docker push rotigue/${{ inputs.REPO_NAME }}:${{ inputs.TAG }}-amd64


  build-arm64:
    runs-on: oracle
    container:
      image: rotigue/img-builder:latest
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    steps:
      - name: Docker Build
        run: |
          echo "${{ secrets.ALIYUN_DOCKER_PASSWORD }}" | docker login --username=${{ secrets.ALIYUN_DOCKER_USERNAME }} registry.cn-hangzhou.aliyuncs.com --password-stdin
          git clone ${{ inputs.GIT_URL }} ${{ inputs.REPO_NAME }}
          cd ${{ inputs.REPO_NAME }}/docker-build
          chmod +x ./build.sh
          export RESOURCE_IP=${{ inputs.ORACLE_RESOURCE_HOST }}
          ./build.sh -a -r ${{ inputs.REPO_NAME }} -t ${{ inputs.TAG }} -c ${{ inputs.USE_CACHE }}

