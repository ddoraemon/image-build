name: docker-build

on:
  workflow_dispatch:
    inputs:
      REPO_NAME:
        description: "仓库名"
        required: false
        type: choice
        options:
          - "debian13"
          - "python3"
          - "img-builder"
          - "freestyle"
        default: "debian13"
      TAG:
        description: "Tag名"
        required: false
        type: string
        default: "untagged"
      USE_CACHE:
        description: "是否使用构建缓存"
        required: false
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      GIT_URL:
        description: "Git地址"
        required: false
        type: string
        default: "https://gitea.rotigue.cn:9443/cloud/image-build.git"
      ORACLE_RESOURCE_HOST:
        description: "oracle的资源机器ip"
        required: false
        type: string
        default: "10.0.0.215"
      PUSH_LATEST:
        description: "是否推送latest"
        required: false
        type: choice
        options:
          - "true"
          - "false"
        default: "false"
      NAS_RESOURCE_HOST:
        description: "nas的资源机器ip"
        required: false
        type: string
        default: "192.168.60.100"


jobs:
  build-amd64:
    runs-on: nas
    container:
      image: registry.cn-hangzhou.aliyuncs.com/rotigue/img-builder:latest
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    steps:
      - name: Docker Build
        run: |
          echo "${{ secrets.ALIYUN_DOCKER_PASSWORD }}" | docker login --username=${{ secrets.ALIYUN_DOCKER_USERNAME }} registry.cn-hangzhou.aliyuncs.com --password-stdin
          git clone ${{ inputs.GIT_URL }} ${{ inputs.REPO_NAME }}
          cd ${{ inputs.REPO_NAME }}/docker-build
          chmod +x ./build.sh
          export RESOURCE_IP=${{ inputs.NAS_RESOURCE_HOST }}
          ./build.sh -x -r ${{ inputs.REPO_NAME }} -t ${{ inputs.TAG }} -c ${{ inputs.USE_CACHE }}

